<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>PetShare Israel — витрина</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --amber: #ffb042; --teal: #40e0c3; --pink: #ff768c;
    --white: #f5f3fa; --grey: #aaa8be;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(180deg, #100e22 0%, #341630 100%);
    min-height: 100vh; color: var(--white); padding-bottom: 40px;
  }
  header { padding: 22px 16px 6px; text-align: center; }
  header h1 { font-size: 26px; letter-spacing: 1px; }
  header h1 .il { color: var(--amber); }
  header p { color: var(--grey); font-size: 13px; margin-top: 4px; }
  .paw { display: inline-block; animation: bounce 2.2s ease-in-out infinite; }
  @keyframes bounce { 0%,100% {transform: translateY(0)} 50% {transform: translateY(-6px)} }

  .chips { display: flex; gap: 8px; overflow-x: auto; padding: 14px 16px 4px;
           -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto; padding: 8px 16px; border-radius: 20px; font-size: 14px;
    border: 1.5px solid var(--grey); color: var(--grey); background: transparent;
    cursor: pointer; white-space: nowrap; transition: all .18s;
  }
  .chip.on { border-color: var(--amber); color: var(--amber); background: rgba(255,176,66,.12); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
          gap: 12px; padding: 14px 16px; }
  .card {
    background: rgba(255,255,255,.045); border: 1px solid rgba(255,255,255,.09);
    border-radius: 18px; overflow: hidden; display: flex; flex-direction: column;
    animation: appear .35s ease both;
  }
  @keyframes appear { from {opacity: 0; transform: translateY(10px)} to {opacity: 1} }
  .ph { height: 120px; display: flex; align-items: center; justify-content: center;
        font-size: 52px; background: linear-gradient(135deg, rgba(255,176,66,.25), rgba(64,224,195,.18)); }
  .ph img { width: 100%; height: 100%; object-fit: cover; }
  .body { padding: 10px 12px 12px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .name { font-weight: 700; font-size: 16px; }
  .name .star { color: var(--amber); font-size: 13px; font-weight: 400; }
  .sub, .desc { color: var(--grey); font-size: 12.5px; }
  .desc { font-style: italic; overflow: hidden; display: -webkit-box;
          -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .price { color: var(--amber); font-weight: 700; font-size: 14px; margin-top: 2px; }
  .book {
    margin-top: auto; display: block; text-align: center; text-decoration: none;
    background: linear-gradient(90deg, var(--amber), #ff9060); color: #1c1430;
    font-weight: 700; font-size: 14px; border-radius: 12px; padding: 9px 0; margin-top: 8px;
  }
  .empty { text-align: center; color: var(--grey); padding: 50px 30px; font-size: 15px; }
  .empty a { color: var(--teal); }
  footer { text-align: center; color: var(--grey); font-size: 12px; padding: 18px; }
</style>
</head>
<body>
<header>
  <h1><span class="paw">🐾</span> PetShare <span class="il">Israel</span></h1>
  <p>walk · play · love — выберите, с кем провести время</p>
</header>
<div class="chips" id="chips"></div>
<div class="grid" id="grid"></div>
<footer>Заявка оформляется в боте за 2 минуты · @dranik_israBot</footer>
<script>
const BOT = "dranik_israBot";
const EMOJI = {"Собаки":"🐕","Кошки":"🐈","Птицы":"🦜","Грызуны и кролики":"🐇",
               "Экзотика и ферма":"🦙","Лошади":"🐴"};
let items = [], active = "все";

const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

function bookLink(it) {
  const payload = (it.kind === "horse" ? "ride_" : "rent_") + it.id;
  return `https://t.me/${BOT}?start=${payload}`;
}

function render() {
  const grid = document.getElementById("grid");
  const list = items.filter(it => active === "все" || it.category === active);
  if (!list.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">Здесь пока идёт набор 🐾<br>
      Напишите боту, кого вы ищете — найдём!<br><br>
      <a href="https://t.me/${BOT}?start=miniapp_wish">Открыть бота</a></div>`;
    return;
  }
  grid.innerHTML = list.map((it, i) => `
    <div class="card" style="animation-delay:${Math.min(i * 40, 400)}ms">
      <div class="ph">${it.photo ? `<img src="${it.photo}" alt="" loading="lazy">`
                                  : (EMOJI[it.category] || "🐾")}</div>
      <div class="body">
        <div class="name">${it.name}
          ${it.rating ? `<span class="star">⭐ ${it.rating}</span>` : ""}</div>
        <div class="sub">${it.breed} · ${it.city}</div>
        ${it.desc ? `<div class="desc">${it.desc}</div>` : ""}
        <div class="price">${it.price_hour}₪/час${it.price_event ? ` · ${it.price_event}₪${it.kind === "horse" ? " закат" : "/событие"}` : ""}</div>
        <a class="book" href="${bookLink(it)}">Забронировать</a>
      </div>
    </div>`).join("");
}

function renderChips(cats) {
  const box = document.getElementById("chips");
  box.innerHTML = ["все", ...cats].map(c =>
    `<button class="chip ${c === active ? "on" : ""}" data-c="${c}">
       ${c === "все" ? "✨ все" : (EMOJI[c] || "🐾") + " " + c}</button>`).join("");
  box.querySelectorAll(".chip").forEach(b => b.onclick = () => {
    active = b.dataset.c; renderChips(cats); render();
  });
}

fetch("catalog.json").then(r => r.json()).then(data => {
  items = data;
  renderChips([...new Set(items.map(it => it.category))]);
  render();
});
</script>
</body>
</html>
